services:
    postgres:
        image: postgres:17-alpine
        container_name: alofy_postgres
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
            POSTGRES_DB: ${DB_NAME:-alofy}
        volumes:
            - alofy_postgres_data:/var/lib/postgresql/data
        networks:
            - alofy_network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:alpine
        container_name: alofy_redis
        restart: always
        volumes:
            - alofy_redis_data:/data
        networks:
            - alofy_network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 30s
            retries: 50

    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        restart: always
        environment:
            DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-alofy}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            JWT_ISSUER: http://api:8000
            PORT: 8000
            NODE_ENV: production
            PISTON_URL: http://piston:2000
        command: /bin/sh -c "pnpm --filter @repo/db exec prisma migrate deploy && pnpm --filter @repo/db exec prisma db seed  && node dist/main.js"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - alofy_network

    piston:
        image: ghcr.io/engineer-man/piston
        container_name: alofy_piston
        restart: always
        privileged: true
        volumes:
            - alofy_piston_data:/piston
        tmpfs:
            - /tmp:exec
        networks:
            - alofy_network

    web:
        build:
            context: .
            dockerfile: apps/web/Dockerfile
            args:
                NEXT_PUBLIC_API_URL: /api
        restart: always
        environment:
            PORT: 3000
            HOSTNAME: "0.0.0.0"
        networks:
            - alofy_network

    nginx:
        image: nginx:alpine
        container_name: alofy_nginx
        restart: always
        ports:
            - "80:80"
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - api
            - web
        networks:
            - alofy_network

networks:
    alofy_network:
        driver: bridge

volumes:
    alofy_postgres_data:
    alofy_redis_data:
    alofy_piston_data:
